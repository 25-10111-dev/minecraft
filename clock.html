<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Timezone Digital Clock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .clock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .clock-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            backdrop-filter: blur(10px);
        }

        .clock-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }

        .timezone-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 15px;
            text-align: center;
        }

        .digital-time {
            font-size: 3em;
            font-weight: bold;
            color: #333;
            text-align: center;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .clock-info {
            text-align: center;
            color: #666;
            font-size: 0.9em;
        }

        .date {
            color: #764ba2;
            font-weight: bold;
            margin-top: 8px;
        }

        .offset {
            color: #999;
            font-size: 0.85em;
            margin-top: 5px;
        }

        .analog-clock {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: white;
            border: 8px solid #667eea;
            position: relative;
            margin: 20px auto;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .center-dot {
            width: 12px;
            height: 12px;
            background: #667eea;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-radius: 10px;
        }

        .hour-hand {
            width: 6px;
            height: 60px;
            background: #667eea;
            margin-left: -3px;
        }

        .minute-hand {
            width: 4px;
            height: 80px;
            background: #764ba2;
            margin-left: -2px;
        }

        .second-hand {
            width: 2px;
            height: 90px;
            background: #e74c3c;
            margin-left: -1px;
        }

        .number {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            color: #333;
        }

        .number span {
            display: inline-block;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .controls {
            text-align: center;
            margin-top: 30px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.9);
            border: none;
            padding: 12px 30px;
            margin: 0 10px;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            color: #667eea;
            font-weight: bold;
        }

        .btn:hover {
            background: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .settings {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            margin-top: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .settings h2 {
            color: #667eea;
            margin-bottom: 20px;
            text-align: center;
        }

        .timezone-input {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        input, select {
            padding: 10px 15px;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-size: 1em;
            font-family: 'Courier New', monospace;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 5px rgba(118, 75, 162, 0.5);
        }

        .preset-timezones {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 15px;
        }

        .preset-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .preset-btn:hover {
            background: #764ba2;
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .digital-time {
                font-size: 2em;
            }

            .clock-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⏰ Multi-Timezone Clock</h1>

        <div class="clock-grid" id="clockGrid">
            <!-- Clocks will be generated here -->
        </div>

        <div class="controls">
            <button class="btn" onclick="toggleAnalog()">Toggle Analog</button>
            <button class="btn" onclick="clearAllClocks()">Clear All</button>
            <button class="btn" onclick="addPreset('all')">Add Popular Timezones</button>
        </div>

        <div class="settings">
            <h2>Add Custom Timezone</h2>
            <div class="timezone-input">
                <input type="text" id="tzName" placeholder="Timezone Name (e.g., Tokyo)">
                <input type="text" id="tzOffset" placeholder="UTC Offset (e.g., +9 or -5)">
                <button class="btn" onclick="addCustomTimezone()">Add</button>
            </div>

            <h3 style="text-align: center; color: #666; margin-top: 20px;">Quick Add Presets:</h3>
            <div class="preset-timezones">
                <button class="preset-btn" onclick="addPreset('tokyo')">Tokyo (UTC+9)</button>
                <button class="preset-btn" onclick="addPreset('london')">London (UTC+0)</button>
                <button class="preset-btn" onclick="addPreset('newyork')">New York (UTC-5)</button>
                <button class="preset-btn" onclick="addPreset('sydney')">Sydney (UTC+10)</button>
                <button class="preset-btn" onclick="addPreset('dubai')">Dubai (UTC+4)</button>
                <button class="preset-btn" onclick="addPreset('lasvegas')">Las Vegas (UTC-8)</button>
                <button class="preset-btn" onclick="addPreset('paris')">Paris (UTC+1)</button>
                <button class="preset-btn" onclick="addPreset('hong kong')">Hong Kong (UTC+8)</button>
            </div>
        </div>
    </div>

    <script src="js/clock.js"></script>
</body>
</html>
